<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Maroon Brew Admin</title>
    <link rel="stylesheet" href="./admin.css" />
  </head>
  <body>
    <main class="admin-shell">
      <h1>Maroon Brew Cafe Admin</h1>
      <p>Bu panel menudeki urun yogunlugu ve rezervasyon akislarini hizli takip etmek icin hazirlandi.</p>

      <section class="admin-grid">
        <article>
          <h2>Aktif Menu Urunu</h2>
          <p id="itemCount">0</p>
        </article>
        <article>
          <h2>Bugunku Rezervasyon</h2>
          <p id="reservationCount">0</p>
        </article>
      </section>

      <section class="admin-grid">
        <article>
          <h2>En Cok Satan</h2>
          <p id="topSeller">-</p>
        </article>
        <article>
          <h2>Mesaj Bekleyen Talep</h2>
          <p id="messageCount">0</p>
        </article>
      </section>

      <p class="admin-note" data-admin-output>Veri bekleniyor...</p>
    </main>
    <script type="module" src="./admin.js"></script>
  </body>
</html>
